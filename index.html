<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Costos | Velas Comestibles</title>
    <style>
        :root { --primary: #f39c12; --secondary: #16a085; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .header-section { text-align: center; margin-bottom: 20px; }
        .header-section h2 { color: var(--secondary); margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .header-section p { color: #7f8c8d; margin: 5px 0 0; font-weight: bold; font-size: 0.9em; }

        .section-title { background: #e8f6f3; padding: 10px; border-radius: 8px; font-weight: bold; color: var(--secondary); margin: 15px 0 10px; border-left: 5px solid var(--secondary); font-size: 0.85em; text-transform: uppercase; }
        
        .row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 30px; gap: 6px; margin-bottom: 8px; align-items: center; }
        .header-row { font-size: 0.65em; font-weight: bold; color: #7f8c8d; text-align: center; text-transform: uppercase; }
        
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 0.85em; }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 0.8em; color: #7f8c8d; margin-bottom: 5px; margin-left: 5px; }

        .btn-add { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 5px; transition: 0.3s; }
        .btn-calc { background: var(--secondary); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 20px; font-size: 1.1em; box-shadow: 0 4px 15px rgba(22, 160, 133, 0.3); }
        
        .btn-remove { background: var(--danger); color: white; border: none; border-radius: 5px; width: 24px; height: 24px; cursor: pointer; font-weight: bold; font-size: 0.8em; display: flex; align-items: center; justify-content: center; padding: 0; }
        
        .result { margin-top: 25px; padding: 20px; background: #2c3e50; color: white; border-radius: 12px; text-align: center; display: none; }
        .result h3 { margin: 5px 0 0; color: var(--primary); font-size: 1.8em; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h2>Calculadora de Costos</h2>
        <p>VELAS COMESTIBLES</p>
    </div>

    <div class="section-title">1. RECIPIENTE Y EMPAQUE</div>
    <div class="input-group">
        <label>Costo del Envase ($)</label>
        <input type="number" id="container-cost" placeholder="Ej: 1500">
    </div>
    <div class="input-group">
        <label>Etiqueta, mecha y empaque ($)</label>
        <input type="number" id="packaging-cost" placeholder="Ej: 800">
    </div>

    <div class="section-title">2. INGREDIENTES (CÁLCULO X GRAMO)</div>
    <div class="row header-row">
        <span>¿Qué es?</span>
        <span>Precio $</span>
        <span>Peso Tot(g)</span>
        <span>Uso (g)</span>
        <span></span>
    </div>
    
    <div id="ingredients-cont">
        <div class="row ingredient-row">
            <input type="text" placeholder="Mantequilla" class="name">
            <input type="number" placeholder="12000" class="price">
            <input type="number" placeholder="500" class="total-weight">
            <input type="number" placeholder="80" class="use">
            <button class="btn-remove" onclick="removeRow(this)">×</button>
        </div>
    </div>

    <button class="btn-add" onclick="addRow()">+ AÑADIR INGREDIENTE</button>

    <div class="section-title">3. OTROS Y MARGEN</div>
    <div class="input-group">
        <input type="number" id="indirects" placeholder="Costos Indirectos (Gas, transporte...)">
    </div>
    
    <div class="input-group">
        <label>Margen de Ganancia deseado (%)</label>
        <select id="margin">
            <option value="0.3">30% de ganancia</option>
            <option value="0.4">40% de ganancia</option>
            <option value="0.5" selected>50% de ganancia</option>
            <option value="0.6">60% de ganancia</option>
            <option value="0.7">70% de ganancia</option>
            <option value="0.8">80% de ganancia</option>
            <option value="0.9">90% de ganancia</option>
            <option value="1.0">100% de ganancia (Duplicar)</option>
            <option value="1.1">110% de ganancia</option>
            <option value="1.2">120% de ganancia</option>
        </select>
    </div>

    <button class="btn-calc" onclick="calculate()">CALCULAR PRECIO FINAL</button>

    <div id="result-box" class="result">
        <p id="total-cost-text" style="font-size: 0.9em; margin: 0; opacity: 0.8;"></p>
        <p style="margin: 5px 0;">Precio de Venta Sugerido:</p>
        <h3 id="final-price"></h3>
    </div>
</div>

<script>
    function addRow() {
        const cont = document.getElementById('ingredients-cont');
        const newRow = document.createElement('div');
        newRow.className = 'row ingredient-row';
        newRow.innerHTML = `
            <input type="text" placeholder="Ingrediente" class="name">
            <input type="number" placeholder="0" class="price">
            <input type="number" placeholder="0" class="total-weight">
            <input type="number" placeholder="0" class="use">
            <button class="btn-remove" onclick="removeRow(this)">×</button>
        `;
        cont.appendChild(newRow);
    }

    function removeRow(btn) {
        const rows = document.querySelectorAll('.ingredient-row');
        if(rows.length > 1) { btn.parentElement.remove(); }
    }

    function calculate() {
        let ingredientsTotal = 0;
        const rows = document.querySelectorAll('.ingredient-row');

        rows.forEach(row => {
            const name = row.querySelector('.name').value.trim();
            const price = parseFloat(row.querySelector('.price').value) || 0;
            const totalWeight = parseFloat(row.querySelector('.total-weight').value) || 0;
            const use = parseFloat(row.querySelector('.use').value) || 0;

            if (name !== "" && price > 0 && totalWeight > 0 && use > 0) {
                ingredientsTotal += (price / totalWeight) * use;
            }
        });

        // RE-INTEGRACIÓN DE TODOS LOS COSTOS AL CÁLCULO
        const containerCost = parseFloat(document.getElementById('container-cost').value) || 0;
        const packagingCost = parseFloat(document.getElementById('packaging-cost').value) || 0;
        const indirects = parseFloat(document.getElementById('indirects').value) || 0;
        const margin = parseFloat(document.getElementById('margin').value);
        
        // El Costo Neto debe ser la suma de TODO
        const netCost = ingredientsTotal + containerCost + packagingCost + indirects;

        if (netCost === 0) {
            alert("Por favor, llena al menos un dato para calcular.");
            return;
        }

        const finalPrice = netCost * (1 + margin);

        // Mostrar resultados formateados
        document.getElementById('total-cost-text').innerText = `Costo Neto: $${Math.round(netCost).toLocaleString()}`;
        document.getElementById('final-price').innerText = `$${Math.round(finalPrice).toLocaleString()}`;
        document.getElementById('result-box').style.display = 'block';
    }
</script>

</body>
</html>
