<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Recetas Gourmet</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f5f2; display: flex; justify-content: center; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; width: 100%; }
        h2 { color: #5d4037; text-align: center; margin-bottom: 5px; }
        p { text-align: center; color: #888; font-size: 0.9em; margin-bottom: 20px; }
        label { font-weight: bold; color: #5d4037; display: block; margin-top: 10px; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .ingrediente-row { display: flex; gap: 10px; margin-top: 10px; }
        .ing-nombre { flex: 2; }
        .ing-porcentaje { flex: 1; }
        button { width: 100%; background-color: #a1887f; color: white; border: none; padding: 12px; border-radius: 8px; margin-top: 15px; cursor: pointer; font-weight: bold; }
        .btn-calcular { background-color: #5d4037; margin-top: 25px; font-size: 1.1em; }
        .resultado { margin-top: 20px; padding: 15px; background-color: #f1ede9; border-left: 5px solid #5d4037; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Creador de Velas</h2>
    <p>Define tus ingredientes y el peso total</p>
    
    <label>Peso Total del Envase (g):</label>
    <input type="number" id="pesoTotal" placeholder="Ej: 500">

    <div id="contenedor-ingredientes">
        <label>Ingredientes adicionales (%):</label>
        <div class="ingrediente-row">
            <input type="text" class="ing-nombre" placeholder="Nombre (ej: Ajo)">
            <input type="number" class="ing-porcentaje" placeholder="%">
        </div>
    </div>

    <button onclick="agregarFila()">+ Añadir otro ingrediente</button>
    <button class="btn-calcular" onclick="calcularReceta()">Calcular Receta Final</button>

    <div id="resultado" class="resultado" style="display:none;"></div>
</div>

<script>
    function agregarFila() {
        const div = document.createElement('div');
        div.className = 'ingrediente-row';
        div.innerHTML = `
            <input type="text" class="ing-nombre" placeholder="Nombre">
            <input type="number" class="ing-porcentaje" placeholder="%">
        `;
        document.getElementById('contenedor-ingredientes').appendChild(div);
    }

    function calcularReceta() {
        const total = parseFloat(document.getElementById('pesoTotal').value);
        const nombres = document.getElementsByClassName('ing-nombre');
        const porcentajes = document.getElementsByClassName('ing-porcentaje');
        
        if (!total) return alert("Pon el peso total");

        let sumaExtras = 0;
        let detalleHtml = `<strong>Tu Receta Final:</strong><br><br>`;

        for (let i = 0; i < nombres.length; i++) {
            let nombre = nombres[i].value || `Ingrediente ${i+1}`;
            let porc = parseFloat(porcentajes[i].value) || 0;
            let gramos = total * (porc / 100);
            sumaExtras += gramos;
            detalleHtml += `• ${nombre}: ${gramos.toFixed(2)} g (${porc}%)<br>`;
        }

        let ceraBase = total - sumaExtras;
        
        if (ceraBase < 0) {
            alert("¡Error! Los porcentajes suman más del 100%");
            return;
        }

        detalleHtml = `• Cera Base: ${ceraBase.toFixed(2)} g<br>` + detalleHtml;
        
        const resDiv = document.getElementById('resultado');
        resDiv.innerHTML = detalleHtml;
        resDiv.style.display = 'block';
    }
</script>

</body>
</html>
