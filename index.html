<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Costos Pro | 800</title>
    <style>
        :root { --primary: #f39c12; --secondary: #16a085; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--secondary); margin-bottom: 20px; }
        .section-title { background: #e8f6f3; padding: 10px; border-radius: 8px; font-weight: bold; color: var(--secondary); margin: 15px 0 10px; border-left: 5px solid var(--secondary); font-size: 0.9em; }
        
        .row { display: grid; grid-template-columns: 2fr 1fr 1.2fr 1fr 35px; gap: 5px; margin-bottom: 8px; align-items: center; }
        .header-row { font-size: 0.7em; font-weight: bold; color: #7f8c8d; text-align: center; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.85em; }
        
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 5px; }
        .btn-calc { background: var(--secondary); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 20px; font-size: 1.1em; }
        .btn-remove { background: var(--danger); color: white; border: none; border-radius: 5px; width: 30px; height: 30px; cursor: pointer; font-weight: bold; }
        
        .result { margin-top: 20px; padding: 15px; background: #2c3e50; color: white; border-radius: 10px; text-align: center; display: none; }
        .result h3 { margin: 5px 0 0; color: var(--primary); font-size: 1.6em; }
    </style>
</head>
<body>

<div class="container">
    <h2>Costos de Receta</h2>

    <div class="section-title">1. INGREDIENTES</div>
    <div class="row header-row">
        <span>Nombre</span>
        <span>Precio $</span>
        <span>Peso Pack</span>
        <span>Uso</span>
        <span></span>
    </div>
    
    <div id="ingredients-cont">
        <div class="row ingredient-row">
            <input type="text" placeholder="Ej: Perejil" class="name">
            <input type="number" class="price">
            <input type="number" class="total-weight">
            <input type="number" class="use">
            <button class="btn-remove" onclick="removeRow(this)">×</button>
        </div>
    </div>

    <button class="btn-add" onclick="addRow()">+ AÑADIR INGREDIENTE</button>

    <div class="section-title">2. MARGEN Y OTROS</div>
    <input type="number" id="indirects" placeholder="Gastos extras (Gas, Envío...)" style="margin-bottom: 10px;">
    
    <select id="margin">
        <option value="0.3">Ganancia del 30%</option>
        <option value="0.5" selected>Ganancia del 50%</option>
        <option value="1">Ganancia del 100% (Duplicar)</option>
    </select>

    <button class="btn-calc" onclick="calculate()">CALCULAR AHORA</button>

    <div id="result-box" class="result">
        <p id="total-cost-text" style="font-size: 0.9em; margin: 0; opacity: 0.8;"></p>
        <p style="margin: 5px 0;">Precio de Venta Sugerido:</p>
        <h3 id="final-price"></h3>
    </div>
</div>

<script>
    function addRow() {
        const cont = document.getElementById('ingredients-cont');
        const newRow = document.createElement('div');
        newRow.className = 'row ingredient-row';
        newRow.innerHTML = `
            <input type="text" placeholder="Ingrediente" class="name">
            <input type="number" class="price">
            <input type="number" class="total-weight">
            <input type="number" class="use">
            <button class="btn-remove" onclick="removeRow(this)">×</button>
        `;
        cont.appendChild(newRow);
    }

    function removeRow(btn) {
        const rows = document.querySelectorAll('.ingredient-row');
        if(rows.length > 1) { btn.parentElement.remove(); }
    }

    function calculate() {
        let totalCost = 0;
        const rows = document.querySelectorAll('.ingredient-row');

        rows.forEach(row => {
            const name = row.querySelector('.name').value.trim();
            const price = parseFloat(row.querySelector('.price').value) || 0;
            const totalWeight = parseFloat(row.querySelector('.total-weight').value) || 0;
            const use = parseFloat(row.querySelector('.use').value) || 0;

            // SOLO CALCULA SI TIENE DATOS REALES (IGNORA FILAS VACÍAS O CON CEROS)
            if (name !== "" && price > 0 && totalWeight > 0 && use > 0) {
                totalCost += (price / totalWeight) * use;
            }
        });

        const indirects = parseFloat(document.getElementById('indirects').value) || 0;
        const margin = parseFloat(document.getElementById('margin').value);
        
        const netCost = totalCost + indirects;

        if (netCost === 0) {
            alert("Por favor, llena al menos un ingrediente con todos sus datos.");
            return;
        }

        const finalPrice = netCost * (1 + margin);

        document.getElementById('total-cost-text').innerText = `Costo Neto: $${Math.round(netCost).toLocaleString()}`;
        document.getElementById('final-price').innerText = `$${Math.round(finalPrice).toLocaleString()}`;
        document.getElementById('result-box').style.display = 'block';
    }
</script>

</body>
</html>
